<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verificar Código - HealthAnalytics IPS</title>
    <link rel="icon" href="/static/Icono.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: url('/static/Fondo.jpeg') no-repeat center center fixed; background-size: cover; min-height: 100vh; display: flex; align-items: center; position: relative; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 0; }
        .container { position: relative; z-index: 1; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 20px 40px rgba(0,0,0,0.3); background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.3); }
        .card-body { padding: 2.5rem; }
        .form-label, .text-muted, a { color: white !important; }
        .form-control { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; }
        .form-control::placeholder { color: rgba(255,255,255,0.7); }
        .form-control:focus { background: rgba(255,255,255,0.3); color: white; }
        .card-header { background: linear-gradient(135deg, #0c4a6e, #1e40af); border-radius: 1rem 1rem 0 0 !important; padding: 1.5rem; }
        .btn-primary { background: linear-gradient(135deg, #0c4a6e, #1e40af); border: none; padding: 0.75rem; font-weight: 600; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(12,74,110,0.4); }
        .form-control { border-radius: 0.5rem; padding: 0.75rem; text-align: center; font-size: 1.5rem; letter-spacing: 0.5rem; }
        .form-control:focus { border-color: #0ea5e9; box-shadow: 0 0 0 0.2rem rgba(14,165,233,0.25); }
        .logo-icon { font-size: 3rem; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header text-center">
                        <i class="bi bi-heart-pulse-fill logo-icon"></i>
                        <h3 class="text-white mt-2">HealthAnalytics IPS</h3>
                        <p class="text-white-50 mb-0">Verificar Código</p>
                    </div>
                    <div class="card-body">
                        <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

                        <form id="verifyForm">
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-123"></i> Código de verificación</label>
                                <input type="text" class="form-control" id="code" placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-check-circle"></i> Verificar Código
                            </button>
                        </form>

                        <div class="text-center mt-3">
                            <button id="resendBtn" class="btn btn-link text-decoration-none p-0" onclick="resendCode()">
                                <i class="bi bi-arrow-counterclockwise"></i> Reenviar código
                            </button>
                            <div id="resendSuccess" class="text-success small d-none mt-2">
                                <i class="bi bi-check-circle"></i> Código reenviado a tu correo
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');

        if (!email) {
            window.location.href = '/password-reset/';
        }

        async function resendCode() {
            const btn = document.getElementById('resendBtn');
            const success = document.getElementById('resendSuccess');
            const errorAlert = document.getElementById('errorAlert');

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Reenviando...';
            errorAlert.classList.add('d-none');
            success.classList.add('d-none');

            try {
                const r = await fetch('/api/auth/csrf/');
                const d = await r.json();
                const res = await fetch('/api/auth/password-reset/send-code/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': d.csrfToken },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();
                if (res.ok) {
                    success.classList.remove('d-none');
                    btn.innerHTML = '<i class="bi bi-arrow-counterclockwise"></i> Reenviar código';
                    btn.disabled = false;
                } else {
                    errorAlert.textContent = data.error;
                    errorAlert.classList.remove('d-none');
                    btn.innerHTML = '<i class="bi bi-arrow-counterclockwise"></i> Reenviar código';
                    btn.disabled = false;
                }
            } catch (err) {
                errorAlert.textContent = 'Error de conexión.';
                errorAlert.classList.remove('d-none');
                btn.innerHTML = '<i class="bi bi-arrow-counterclockwise"></i> Reenviar código';
                btn.disabled = false;
            }
        }

        document.getElementById('verifyForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const code = document.getElementById('code').value;
            const errorAlert = document.getElementById('errorAlert');
            const btn = this.querySelector('button');

            errorAlert.classList.add('d-none');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Verificando...';

            try {
                const r = await fetch('/api/auth/csrf/');
                const d = await r.json();
                const res = await fetch('/api/auth/password-reset/verify-code/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': d.csrfToken },
                    body: JSON.stringify({ email, code })
                });

                const data = await res.json();

                if (res.ok) {
                    window.location.href = '/password-reset/confirm/?email=' + encodeURIComponent(email) + '&code=' + encodeURIComponent(code);
                } else {
                    errorAlert.textContent = data.error;
                    errorAlert.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-check-circle"></i> Verificar Código';
                }
            } catch (err) {
                errorAlert.textContent = 'Error de conexión. Verifique el servidor.';
                errorAlert.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-check-circle"></i> Verificar Código';
            }
        });
    </script>
</body>
</html>
