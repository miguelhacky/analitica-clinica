<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthAnalytics IPS - Iniciar Sesión</title>
    <link rel="icon" href="/static/Icono.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: url('/static/Fondo.jpeg') no-repeat center center fixed; background-size: cover; min-height: 100vh; display: flex; align-items: center; position: relative; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 0; }
        .container { position: relative; z-index: 1; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 20px 40px rgba(0,0,0,0.3); background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.3); }
        .card-body { padding: 2.5rem; }
        .form-label, .text-muted, a { color: white !important; }
        .form-control { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; }
        .form-control::placeholder { color: rgba(255,255,255,0.7); }
        .form-control:focus { background: rgba(255,255,255,0.3); color: white; }
        .card-header { background: linear-gradient(135deg, #0c4a6e, #1e40af); border-radius: 1rem 1rem 0 0 !important; padding: 1.5rem; }
        .btn-primary { background: linear-gradient(135deg, #0c4a6e, #1e40af); border: none; padding: 0.75rem; font-weight: 600; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(12,74,110,0.4); }
        .form-control { border-radius: 0.5rem; padding: 0.75rem; }
        .form-control:focus { border-color: #0ea5e9; box-shadow: 0 0 0 0.2rem rgba(14,165,233,0.25); }
        .error-msg { display: none; }
        .logo-icon { font-size: 3rem; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header text-center">
                        <i class="bi bi-heart-pulse-fill logo-icon"></i>
                        <h3 class="text-white mt-2">HealthAnalytics IPS</h3>
                        <p class="text-white-50 mb-0">Plataforma de Analítica Clínica</p>
                    </div>
                    <div class="card-body">
                        <div id="errorAlert" class="alert alert-danger d-none" role="alert"></div>

                        <form id="loginForm">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-envelope"></i> Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" placeholder="Añade un correo" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label"><i class="bi bi-lock"></i> Contraseña</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="password" placeholder="Agrega una contraseña" required>
                                    <button class="btn btn-outline-secondary" type="button" id="togglePassword" onclick="togglePass()"><i class="bi bi-eye-slash" id="passIcon"></i></button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted">¿No tienes cuenta? <a href="/register/" class="text-decoration-none fw-bold">Registrarse</a></p>
                        </div>

                        <div class="text-center mt-3">
                            <a href="/password-reset/" class="text-decoration-none">¿Olvidaste tu contraseña?</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePass() {
            const input = document.getElementById('password');
            const icon = document.getElementById('passIcon');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye-slash';
            }
        }

        async function getCsrf() {
            const r = await fetch('/api/auth/csrf/');
            const d = await r.json();
            return d.csrfToken;
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorAlert = document.getElementById('errorAlert');
            const btn = this.querySelector('button');

            errorAlert.classList.add('d-none');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm"></span> Iniciando...';

            try {
                const csrf = await getCsrf();

                const sessionRes = await fetch('/api/auth/session-login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-CSRFToken': csrf },
                    body: JSON.stringify({ email, password })
                });

                const sessionData = await sessionRes.json();

                if (!sessionRes.ok) {
                    errorAlert.textContent = sessionData.error || 'Credenciales incorrectas. Intente de nuevo.';
                    errorAlert.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión';
                    return;
                }

                const tokenRes = await fetch('/api/auth/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const tokenData = await tokenRes.json();
                if (tokenRes.ok) {
                    localStorage.setItem('access_token', tokenData.access);
                    localStorage.setItem('refresh_token', tokenData.refresh);
                }

                window.location.href = '/dashboard/';
            } catch (err) {
                errorAlert.textContent = 'Error de conexión. Verifique el servidor.';
                errorAlert.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión';
            }
        });
    </script>
</body>
</html>
