<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthAnalytics IPS - Registro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: linear-gradient(135deg, #0c4a6e 0%, #0ea5e9 100%); min-height: 100vh; display: flex; align-items: center; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 20px 40px rgba(0,0,0,0.2); }
        .card-header { background: linear-gradient(135deg, #0c4a6e, #1e40af); border-radius: 1rem 1rem 0 0 !important; padding: 1.5rem; }
        .card-body { padding: 2.5rem; }
        .btn-primary { background: linear-gradient(135deg, #0c4a6e, #1e40af); border: none; padding: 0.75rem; font-weight: 600; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(12,74,110,0.4); }
        .form-control { border-radius: 0.5rem; padding: 0.75rem; }
        .form-control:focus { border-color: #0ea5e9; box-shadow: 0 0 0 0.2rem rgba(14,165,233,0.25); }
        .logo-icon { font-size: 2.5rem; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header text-center">
                        <i class="bi bi-person-plus-fill logo-icon"></i>
                        <h3 class="text-white mt-2">Crear Cuenta</h3>
                        <p class="text-white-50 mb-0">Regístrese en HealthAnalytics IPS</p>
                    </div>
                    <div class="card-body">
                        <div id="errorAlert" class="alert alert-danger d-none"></div>
                        <div id="successAlert" class="alert alert-success d-none"></div>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-envelope"></i> Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-person-badge"></i> Rol</label>
                                <select class="form-control" id="role">
                                    <option value="Medico">Médico</option>
                                    <option value="Analista">Analista</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-lock"></i> Contraseña</label>
                                <input type="password" class="form-control" id="password" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label"><i class="bi bi-lock-fill"></i> Confirmar Contraseña</label>
                                <input type="password" class="form-control" id="password2" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-person-plus"></i> Crear Cuenta
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted">¿Ya tienes cuenta? <a href="/login/" class="text-decoration-none fw-bold">Iniciar Sesión</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');

            if (password !== password2) {
                errorAlert.textContent = 'Las contraseñas no coinciden';
                errorAlert.classList.remove('d-none');
                return;
            }

            if (password.length < 4) {
                errorAlert.textContent = 'La contraseña debe tener al menos 4 caracteres';
                errorAlert.classList.remove('d-none');
                return;
            }

            try {
                const response = await fetch('/api/auth/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, password2, role })
                });

                const data = await response.json();

                if (response.ok) {
                    successAlert.textContent = 'Cuenta creada correctamente. Redirigiendo al login...';
                    successAlert.classList.remove('d-none');
                    setTimeout(() => window.location.href = '/login/', 2000);
                } else {
                    errorAlert.textContent = data.detail || data.email?.[0] || 'Error al crear la cuenta';
                    errorAlert.classList.remove('d-none');
                }
            } catch (err) {
                errorAlert.textContent = 'Error de conexión';
                errorAlert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
