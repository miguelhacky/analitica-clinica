<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthAnalytics IPS - Registro</title>
    <link rel="icon" href="/static/Icono.png" type="image/png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body { background: url('/static/Fondo.jpeg') no-repeat center center fixed; background-size: cover; min-height: 100vh; display: flex; align-items: center; position: relative; }
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); z-index: 0; }
        .container { position: relative; z-index: 1; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 20px 40px rgba(0,0,0,0.3); background: rgba(255,255,255,0.15); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.3); }
        .card-body { padding: 2.5rem; }
        .form-label, .text-muted, a { color: white !important; }
        .form-control { background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; }
        .form-control::placeholder { color: rgba(255,255,255,0.7); }
        .form-control:focus { background: rgba(255,255,255,0.3); color: white; }
        .card-header { background: linear-gradient(135deg, #0c4a6e, #1e40af); border-radius: 1rem 1rem 0 0 !important; padding: 1.5rem; }
        .btn-primary { background: linear-gradient(135deg, #0c4a6e, #1e40af); border: none; padding: 0.75rem; font-weight: 600; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(12,74,110,0.4); }
        .form-control { border-radius: 0.5rem; padding: 0.75rem; }
        .form-control:focus { border-color: #0ea5e9; box-shadow: 0 0 0 0.2rem rgba(14,165,233,0.25); }
        .logo-icon { font-size: 2.5rem; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header text-center">
                        <i class="bi bi-person-plus-fill logo-icon"></i>
                        <h3 class="text-white mt-2">Crear Cuenta</h3>
                        <p class="text-white-50 mb-0">Regístrese en HealthAnalytics IPS</p>
                    </div>
                    <div class="card-body">
                        <div id="errorAlert" class="alert alert-danger d-none"></div>
                        <div id="successAlert" class="alert alert-success d-none"></div>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-envelope"></i> Correo Electrónico</label>
                                <input type="email" class="form-control" id="email" required>
                            </div>
                            <div class="row g-2 mb-3">
                                <div class="col-md-6">
                                    <label class="form-label"><i class="bi bi-person"></i> Nombre</label>
                                    <input type="text" class="form-control" id="first_name" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label"><i class="bi bi-person"></i> Apellido</label>
                                    <input type="text" class="form-control" id="last_name" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-person-badge"></i> Rol</label>
                                <select class="form-control" id="role">
                                    <option value="Medico">Médico</option>
                                    <option value="Analista">Analista</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label"><i class="bi bi-lock"></i> Contraseña</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="password" required>
                                    <button class="btn btn-outline-secondary" type="button" onclick="togglePass('password','passIcon1')"><i class="bi bi-eye-slash" id="passIcon1"></i></button>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label"><i class="bi bi-lock-fill"></i> Confirmar Contraseña</label>
                                <div class="input-group">
                                    <input type="password" class="form-control" id="password2" required>
                                    <button class="btn btn-outline-secondary" type="button" onclick="togglePass('password2','passIcon2')"><i class="bi bi-eye-slash" id="passIcon2"></i></button>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">
                                <i class="bi bi-person-plus"></i> Crear Cuenta
                            </button>
                        </form>

                        <div class="text-center mt-4">
                            <p class="text-muted">¿Ya tienes cuenta? <a href="/login/" class="text-decoration-none fw-bold">Iniciar Sesión</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function togglePass(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye-slash';
            }
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const first_name = document.getElementById('first_name').value;
            const last_name = document.getElementById('last_name').value;
            const email = document.getElementById('email').value;
            const role = document.getElementById('role').value;
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            errorAlert.classList.add('d-none');
            successAlert.classList.add('d-none');

            if (password !== password2) {
                errorAlert.textContent = 'Las contraseñas no coinciden';
                errorAlert.classList.remove('d-none');
                return;
            }

            if (password.length < 4) {
                errorAlert.textContent = 'La contraseña debe tener al menos 4 caracteres';
                errorAlert.classList.remove('d-none');
                return;
            }

            try {
                const response = await fetch('/api/auth/register/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, password2, role, first_name, last_name })
                });

                const data = await response.json();

                if (response.ok) {
                    successAlert.textContent = 'Cuenta creada correctamente. Redirigiendo al login...';
                    successAlert.classList.remove('d-none');
                    setTimeout(() => window.location.href = '/login/', 2000);
                } else {
                    errorAlert.textContent = data.detail || data.email?.[0] || 'Error al crear la cuenta';
                    errorAlert.classList.remove('d-none');
                }
            } catch (err) {
                errorAlert.textContent = 'Error de conexión';
                errorAlert.classList.remove('d-none');
            }
        });
    </script>
</body>
</html>
